<svg xmlns="http://www.w3.org/2000/svg" viewBox="-70 -70 140 140" width="140" height="140">
  <defs>
    <!-- Glow filter for the waveform -->
    <filter id="mmGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Gradient for the waveform bars -->
    <linearGradient id="mmBarGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>

    <!-- Subtle ring gradient -->
    <linearGradient id="mmRingGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>

    <!-- One film sprocket perforation, stamped around the reel band -->
    <rect id="mmPerf" x="-4" y="-55" width="8" height="6" rx="1.8" fill="url(#mmBarGrad)" opacity="0.85"/>
  </defs>

  <!-- Outer halo with pulse animation -->
  <circle cx="0" cy="0" r="62" fill="none" stroke="url(#mmRingGrad)" stroke-width="1.5" opacity="0.25">
    <animate attributeName="r" values="62;65;62" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.25;0.1;0.25" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Reel band edges -->
  <circle cx="0" cy="0" r="58" fill="none" stroke="url(#mmRingGrad)" stroke-width="2" opacity="0.55"/>
  <circle cx="0" cy="0" r="46" fill="none" stroke="url(#mmRingGrad)" stroke-width="2" opacity="0.55"/>

  <!-- Rotating sprocket perforations: the reel in motion -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="14s" repeatCount="indefinite"/>
    <use href="#mmPerf"/>
    <use href="#mmPerf" transform="rotate(22.5)"/>
    <use href="#mmPerf" transform="rotate(45)"/>
    <use href="#mmPerf" transform="rotate(67.5)"/>
    <use href="#mmPerf" transform="rotate(90)"/>
    <use href="#mmPerf" transform="rotate(112.5)"/>
    <use href="#mmPerf" transform="rotate(135)"/>
    <use href="#mmPerf" transform="rotate(157.5)"/>
    <use href="#mmPerf" transform="rotate(180)"/>
    <use href="#mmPerf" transform="rotate(202.5)"/>
    <use href="#mmPerf" transform="rotate(225)"/>
    <use href="#mmPerf" transform="rotate(247.5)"/>
    <use href="#mmPerf" transform="rotate(270)"/>
    <use href="#mmPerf" transform="rotate(292.5)"/>
    <use href="#mmPerf" transform="rotate(315)"/>
    <use href="#mmPerf" transform="rotate(337.5)"/>
  </g>

  <!-- Animated equalizer bars: the soundtrack at the heart of the reel -->
  <g filter="url(#mmGlow)">
    <rect x="-30" y="-4" width="5" height="8" rx="2.5" fill="url(#mmBarGrad)">
      <animate attributeName="height" values="8;28;14;32;8" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-4;-14;-7;-16;-4" dur="1.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="-20" y="-4" width="5" height="8" rx="2.5" fill="url(#mmBarGrad)">
      <animate attributeName="height" values="8;36;20;12;8" dur="1.4s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-4;-18;-10;-6;-4" dur="1.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="-10" y="-4" width="5" height="8" rx="2.5" fill="url(#mmBarGrad)">
      <animate attributeName="height" values="8;42;16;38;8" dur="1.0s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-4;-21;-8;-19;-4" dur="1.0s" repeatCount="indefinite"/>
    </rect>
    <rect x="0" y="-4" width="5" height="8" rx="2.5" fill="url(#mmBarGrad)">
      <animate attributeName="height" values="8;46;24;42;8" dur="0.9s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-4;-23;-12;-21;-4" dur="0.9s" repeatCount="indefinite"/>
    </rect>
    <rect x="10" y="-4" width="5" height="8" rx="2.5" fill="url(#mmBarGrad)">
      <animate attributeName="height" values="8;34;18;40;8" dur="1.1s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-4;-17;-9;-20;-4" dur="1.1s" repeatCount="indefinite"/>
    </rect>
    <rect x="20" y="-4" width="5" height="8" rx="2.5" fill="url(#mmBarGrad)">
      <animate attributeName="height" values="8;24;30;10;8" dur="1.3s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-4;-12;-15;-5;-4" dur="1.3s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
