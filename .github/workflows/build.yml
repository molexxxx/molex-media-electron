# -----------------------------------------------------
# Build - Cross-platform Electron builds
# Runs on every push to main and on PRs (draft artifacts)
# -----------------------------------------------------
name: Build

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.github/assets/**'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.github/assets/**'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: package:win
            artifact: dist/*.exe
          - os: macos-latest
            script: package:mac
            artifact: dist/*.pkg
          - os: ubuntu-latest
            script: package:linux
            artifact: dist/*.deb

    runs-on: ${{ matrix.os }}

    env:
      # Surfaced to job env so step `if:` can test it - the `secrets` context
      # is not allowed inside `if` expressions, but `env` is.
      MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          YOUTUBE_DL_SKIP_DOWNLOAD: '1'

      - name: Install rpm tooling
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y rpm

      # macOS, signed + notarized: runs only when the Apple Developer ID cert
      # and notarization secrets are configured.
      - name: Build & Package (macOS, signed)
        if: matrix.os == 'macos-latest' && env.MAC_CSC_LINK != ''
        run: npm run ${{ matrix.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # macOS fallback before signing secrets exist: unsigned build so the
      # build pipeline keeps working.
      - name: Build & Package (macOS, unsigned)
        if: matrix.os == 'macos-latest' && env.MAC_CSC_LINK == ''
        run: npm run ${{ matrix.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Empty CSC_LINK makes electron-builder treat it as a cert path and
          # fail; disable identity discovery instead for an unsigned build.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Build & Package (Windows/Linux)
        if: matrix.os != 'macos-latest'
        run: npm run ${{ matrix.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.pkg
            dist/*.zip
            dist/*.deb
            dist/*.rpm
            dist/*.yml
          if-no-files-found: warn
          retention-days: 14

  notify-badges:
    name: Refresh profile badges
    needs: [build]
    if: github.event_name != 'pull_request' && always()
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch refresh-badges
        env:
          GH_TOKEN: ${{ secrets.BADGES_DISPATCH_TOKEN }}
        run: |
          gh api -X POST repos/tonywied17/tonywied17/dispatches \
            -f event_type=refresh-badges \
            -f "client_payload[repo]=${{ github.repository }}"
