# -----------------------------------------------------
# Release - Auto-generate releases with changelogs
# Triggered by pushing a version tag: v*.*.*
# -----------------------------------------------------
name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  test:
    name: Test & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci --legacy-peer-deps
        env:
          YOUTUBE_DL_SKIP_DOWNLOAD: '1'

      - name: TypeScript type check
        run: npx tsc -b --noEmit

      - name: Unit tests with coverage
        run: npm run test:coverage

  release:
    name: Release (${{ matrix.os }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: package:win
          - os: macos-latest
            script: package:mac
          - os: ubuntu-latest
            script: package:linux

    runs-on: ${{ matrix.os }}

    env:
      # Surfaced to job env so step `if:` can test it - the `secrets` context
      # is not allowed inside `if` expressions, but `env` is.
      MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Full history for changelog generation

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          YOUTUBE_DL_SKIP_DOWNLOAD: '1'

      - name: Install rpm tooling
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y rpm

      # macOS, signed + notarized: runs only when the Apple Developer ID cert
      # and notarization secrets are configured. Produces a Gatekeeper-approved
      # .pkg that opens without warnings.
      - name: Build & Package (macOS, signed)
        if: matrix.os == 'macos-latest' && env.MAC_CSC_LINK != ''
        run: npm run ${{ matrix.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # macOS fallback before signing secrets exist: unsigned build so the
      # release pipeline keeps working. Drop this once signing is in place.
      - name: Build & Package (macOS, unsigned)
        if: matrix.os == 'macos-latest' && env.MAC_CSC_LINK == ''
        run: npm run ${{ matrix.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Empty CSC_LINK makes electron-builder treat it as a cert path and
          # fail; disable identity discovery instead for an unsigned build.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Build & Package (Windows/Linux)
        if: matrix.os != 'macos-latest'
        run: npm run ${{ matrix.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      # Upload only the platform installers (and the updater metadata) to a
      # shared draft release. Each matrix job appends its own assets to the
      # same draft, matched by tag. The publish job flips the draft to public.
      - name: Upload installers to draft release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          files: |
            dist/molexMedia-*-Windows-Setup.exe
            dist/molexMedia-*-macOS-Installer.pkg
            dist/molexMedia-*-macOS-Updater.zip
            dist/molexMedia-*-Linux-Installer.deb
            dist/molexMedia-*-Linux-Installer.rpm
            dist/latest*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish Release
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: .github/cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Publish release with changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --notes-file RELEASE_NOTES.md \
            --draft=false --latest
