# -----------------------------------------------------
# Release - Auto-generate releases with changelogs
# Triggered by pushing a version tag: v*.*.*
# -----------------------------------------------------
name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  actions: read  # allows notarize-complete to download artifacts across runs

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci --legacy-peer-deps
        env:
          YOUTUBE_DL_SKIP_DOWNLOAD: '1'

      - name: TypeScript type check
        run: npx tsc -b --noEmit

      - name: Unit tests with coverage
        run: npm run test:coverage

  release:
    name: Release (${{ matrix.os }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: package:win
          - os: macos-latest
            script: package:mac
          - os: ubuntu-latest
            script: package:linux

    runs-on: ${{ matrix.os }}

    env:
      MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Full history for changelog generation

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          YOUTUBE_DL_SKIP_DOWNLOAD: '1'

      - name: Install rpm tooling
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y rpm

      # macOS, signed: builds a signed (not-yet-notarized) .dmg/.zip. The next
      # step submits the .dmg to Apple without waiting; the notarize-macos job
      # polls for approval and staples it.
      - name: Build & Package (macOS, signed)
        if: matrix.os == 'macos-latest' && env.MAC_CSC_LINK != ''
        run: npm run ${{ matrix.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # Submit the signed .dmg to Apple notarization without waiting. notarytool
      # accepts .dmg/.zip/.pkg (not a raw .app). Notarizing the .dmg also
      # registers the inner app's signature with Apple, so the updater .zip is
      # covered for online Gatekeeper checks even though only the .dmg is stapled.
      - name: Submit macOS .dmg for notarization (no-wait)
        if: matrix.os == 'macos-latest' && env.MAC_CSC_LINK != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          dmg=$(ls dist/molexMedia-*-macOS-Installer.dmg | head -1)
          echo "Submitting $dmg for notarization (no-wait)..."
          xcrun notarytool submit "$dmg" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --no-wait --output-format json | tee notarization-submission.json
          echo "Submission id: $(jq -r '.id' notarization-submission.json)"

      # macOS fallback: unsigned build when signing secrets are absent.
      - name: Build & Package (macOS, unsigned)
        if: matrix.os == 'macos-latest' && env.MAC_CSC_LINK == ''
        run: npm run ${{ matrix.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Build & Package (Windows/Linux)
        if: matrix.os != 'macos-latest'
        run: npm run ${{ matrix.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      # Windows / Linux: upload directly to the draft release.
      - name: Upload installers to draft release (Windows/Linux)
        if: matrix.os != 'macos-latest'
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          files: |
            dist/molexMedia-*-Windows-Setup.exe
            dist/molexMedia-*-Linux-Installer.deb
            dist/molexMedia-*-Linux-Installer.rpm
            dist/latest*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # macOS signed: stash artifacts for the notarize-macos job instead of
      # uploading to the draft release. The signed-but-unstapled .dmg is also
      # uploaded to the draft so that notarize-complete.yml can find it by tag
      # if the notarize-macos job times out (>6 h initial notarization).
      - name: Save macOS artifacts for notarization job
        if: matrix.os == 'macos-latest' && env.MAC_CSC_LINK != ''
        uses: actions/upload-artifact@v4
        with:
          name: macos-notarize
          path: |
            dist/molexMedia-*-macOS-Installer.dmg
            dist/molexMedia-*-macOS-Updater.zip
            dist/latest-mac.yml
            notarization-submission.json
          retention-days: 90

      - name: Upload unstapled macOS installer to draft release
        if: matrix.os == 'macos-latest' && env.MAC_CSC_LINK != ''
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          files: |
            dist/molexMedia-*-macOS-Installer.dmg
            dist/molexMedia-*-macOS-Updater.zip
            dist/latest-mac.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # macOS unsigned fallback: upload directly (no notarization step needed).
      - name: Upload macOS unsigned build to draft release
        if: matrix.os == 'macos-latest' && env.MAC_CSC_LINK == ''
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          files: |
            dist/molexMedia-*-macOS-Installer.dmg
            dist/molexMedia-*-macOS-Updater.zip
            dist/latest-mac.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Waits for Apple to approve the notarization submission, then staples the
  # ticket to the .dmg and replaces the unstapled asset in the draft release.
  # Timeout: 6 hours. If Apple hasn't responded by then (common for the very
  # first submission on a new Developer account), let this job fail and use
  # the notarize-complete workflow (workflow_dispatch) to finish manually.
  notarize-macos:
    name: Notarize & Staple macOS
    needs: release
    runs-on: macos-latest
    timeout-minutes: 360
    steps:
      - name: Download macOS artifacts
        id: download
        uses: actions/download-artifact@v8
        with:
          name: macos-notarize
        continue-on-error: true

      - name: Skip if no notarization artifact (unsigned build)
        if: steps.download.outcome == 'failure'
        run: echo "No macos-notarize artifact — unsigned build or credentials not set, skipping."

      - name: Wait for Apple notarization
        if: steps.download.outcome == 'success'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          submission_id=$(jq -r '.id' notarization-submission.json)
          echo "Waiting on Apple notarization submission: $submission_id"

          # Retry up to 5 times to recover from transient network drops.
          for attempt in $(seq 1 5); do
            if xcrun notarytool wait "$submission_id" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_APP_SPECIFIC_PASSWORD" \
                --team-id "$APPLE_TEAM_ID"; then
              echo "Notarization accepted (attempt $attempt)"
              exit 0
            fi

            # notarytool wait exited non-zero — could be network drop or rejection.
            status=$(xcrun notarytool info "$submission_id" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --output-format json 2>/dev/null \
              | jq -r '.status // "unknown"' 2>/dev/null || echo "unknown")

            echo "Status after wait exit (attempt $attempt/5): $status"

            case "$status" in
              Accepted)
                echo "Already accepted (status check)"
                exit 0
                ;;
              Invalid|Rejected)
                xcrun notarytool log "$submission_id" \
                  --apple-id "$APPLE_ID" \
                  --password "$APPLE_APP_SPECIFIC_PASSWORD" \
                  --team-id "$APPLE_TEAM_ID" || true
                exit 1
                ;;
              *)
                if [ "$attempt" -lt 5 ]; then
                  echo "Retrying in 60 s (likely a network blip)..."
                  sleep 60
                else
                  echo "All retry attempts exhausted — job timed out or network is broken."
                  echo "Use the 'Complete macOS Notarization' workflow to finish manually."
                  exit 1
                fi
                ;;
            esac
          done

      - name: Staple notarization ticket to installer
        if: steps.download.outcome == 'success'
        run: |
          dmg=$(ls dist/molexMedia-*-macOS-Installer.dmg | head -1)
          # Apple's ticket can lag behind notarytool "Accepted"; stapler then
          # fails with exit 66 (ticket not found). Retry until the CDN has it.
          for attempt in $(seq 1 10); do
            if xcrun stapler staple -v "$dmg"; then
              echo "Stapled on attempt $attempt"
              exit 0
            fi
            echo "Staple attempt $attempt/10 failed (ticket not propagated yet); retrying in 30 s..."
            sleep 30
          done
          echo "Stapling failed after all retries"
          exit 1

      # Replace the unstapled .dmg in the draft release with the stapled one.
      - name: Upload stapled macOS installer to draft release
        if: steps.download.outcome == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            dist/molexMedia-*-macOS-Installer.dmg \
            --repo "${{ github.repository }}" \
            --clobber

  publish:
    name: Publish Release
    needs: [release, notarize-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: .github/cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Publish release with changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --notes-file RELEASE_NOTES.md \
            --draft=false --latest

  notify-badges:
    name: Refresh profile badges
    needs: [publish]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch refresh-badges
        env:
          GH_TOKEN: ${{ secrets.BADGES_DISPATCH_TOKEN }}
        run: |
          gh api -X POST repos/tonywied17/tonywied17/dispatches \
            -f event_type=refresh-badges \
            -f "client_payload[repo]=${{ github.repository }}"
