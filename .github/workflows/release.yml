# -----------------------------------------------------
# Release - Auto-generate releases with changelogs
# Triggered by pushing a version tag: v*.*.*
# -----------------------------------------------------
name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  test:
    name: Test & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci --legacy-peer-deps
        env:
          YOUTUBE_DL_SKIP_DOWNLOAD: '1'

      - name: TypeScript type check
        run: npx tsc -b --noEmit

      - name: Unit tests with coverage
        run: npm run test:coverage

  release:
    name: Release (${{ matrix.os }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: package:win
          - os: macos-latest
            script: package:mac
          - os: ubuntu-latest
            script: package:linux

    runs-on: ${{ matrix.os }}

    env:
      # Surfaced to job env so step `if:` can test it - the `secrets` context
      # is not allowed inside `if` expressions, but `env` is.
      MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Full history for changelog generation

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          YOUTUBE_DL_SKIP_DOWNLOAD: '1'

      # macOS, signed + notarized: runs only when the Apple Developer ID cert
      # and notarization secrets are configured. Produces a Gatekeeper-approved
      # .dmg that opens without warnings.
      - name: Build & Package (macOS, signed)
        if: matrix.os == 'macos-latest' && env.MAC_CSC_LINK != ''
        run: npm run ${{ matrix.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # macOS fallback before signing secrets exist: unsigned build so the
      # release pipeline keeps working. Drop this once signing is in place.
      - name: Build & Package (macOS, unsigned)
        if: matrix.os == 'macos-latest' && env.MAC_CSC_LINK == ''
        run: npm run ${{ matrix.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Empty CSC_LINK makes electron-builder treat it as a cert path and
          # fail; disable identity discovery instead for an unsigned build.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Build & Package (Windows/Linux)
        if: matrix.os != 'macos-latest'
        run: npm run ${{ matrix.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.yml
          if-no-files-found: warn

  publish:
    name: Publish Release
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: .github/cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ steps.changelog.outputs.content }}
          files: artifacts/**/*
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') || contains(github.ref, '-rc') }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
