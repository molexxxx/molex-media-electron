appId: com.molex.media
productName: molexMedia
publish:
  provider: github
  owner: tonywied17
  repo: molex-media-electron
directories:
  buildResources: build
  output: dist
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.*'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{tailwind.config.js,postcss.config.js}'
win:
  executableName: molexMedia
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  artifactName: molexMedia-${version}-Windows-Setup.${ext}
nsis:
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  createStartMenuShortcut: true
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  # No differential/blockmap files - keeps the release assets clean.
  differentialPackage: false
# Notarization is handled by this afterSign hook, which submits to Apple
# without waiting. The CI notarize-macos job polls for approval and staples
# the .pkg before uploading to the release. This split handles the long
# initial wait on new Apple Developer accounts (up to 24 h).
afterSign: build/notarize.js
mac:
  icon: build/icon.png
  category: public.app-category.music
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Disable electron-builder's built-in notarize step — it auto-detects Apple
  # credentials and runs a blocking poll even without notarize:true. Our
  # afterSign hook (build/notarize.js) handles submission without waiting.
  notarize: false
  target:
    - target: pkg
      arch:
        - universal
    # Squirrel.Mac applies updates from a zipped .app, so electron-updater
    # requires a zip in latest-mac.yml. The .pkg is the user-facing installer
    # (-Installer); this zip is only consumed by the in-app auto-updater
    # (-Updater).
    - target: zip
      arch:
        - universal
  artifactName: molexMedia-${version}-macOS-Updater.${ext}
pkg:
  artifactName: molexMedia-${version}-macOS-Installer.${ext}
linux:
  icon: build/icon.png
  target:
    - target: deb
      arch:
        - x64
    - target: rpm
      arch:
        - x64
  maintainer: molex
  category: AudioVideo
  artifactName: molexMedia-${version}-Linux-Installer.${ext}
