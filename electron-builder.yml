appId: com.molex.media
productName: molexMedia
publish:
  provider: github
  owner: tonywied17
  repo: molex-media-electron
directories:
  buildResources: build
  output: dist
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.*'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{tailwind.config.js,postcss.config.js}'
win:
  executableName: molexMedia
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  createStartMenuShortcut: true
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  # No differential/blockmap files - keeps the release assets clean.
  differentialPackage: false
mac:
  icon: build/icon.png
  category: public.app-category.music
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Notarization runs only when Apple credentials (APPLE_ID,
  # APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID) are present in the environment
  # and the build is signed. Unsigned local/CI builds skip it automatically.
  notarize: true
  target:
    - target: dmg
      arch:
        - x64
        - arm64
linux:
  icon: build/icon.png
  target:
    - target: AppImage
      arch:
        - x64
  maintainer: molex
  category: AudioVideo
