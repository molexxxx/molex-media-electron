appId: com.molex.media
productName: molexMedia
publish:
  provider: github
  owner: tonywied17
  repo: molex-media-electron
directories:
  buildResources: build
  output: dist
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.*'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{tailwind.config.js,postcss.config.js}'
win:
  executableName: molexMedia
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  artifactName: molexMedia-${version}-Windows-Setup.${ext}
nsis:
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  createStartMenuShortcut: true
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  # No differential/blockmap files - keeps the release assets clean.
  differentialPackage: false
mac:
  icon: build/icon.png
  category: public.app-category.music
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Disable electron-builder's built-in notarize step — it auto-detects Apple
  # credentials and runs a blocking poll even without notarize:true. The
  # release workflow submits the .dmg to notarytool (no-wait) in a dedicated
  # step and staples it in the notarize-macos job, so the build never blocks
  # on Apple's queue (up to 24 h on new Developer accounts).
  notarize: false
  target:
    # .dmg is signed with the Developer ID Application cert (same one that
    # signs the .app) — unlike .pkg, which needs a separate Developer ID
    # Installer cert. This keeps signing/notarization/stapling to one cert.
    - target: dmg
      arch:
        - universal
    # Squirrel.Mac applies updates from a zipped .app, so electron-updater
    # requires a zip in latest-mac.yml. The .dmg is the user-facing installer
    # (-Installer); this zip is only consumed by the in-app auto-updater
    # (-Updater).
    - target: zip
      arch:
        - universal
  artifactName: molexMedia-${version}-macOS-Updater.${ext}
dmg:
  artifactName: molexMedia-${version}-macOS-Installer.${ext}
linux:
  icon: build/icon.png
  target:
    - target: deb
      arch:
        - x64
    - target: rpm
      arch:
        - x64
  maintainer: molex
  category: AudioVideo
  artifactName: molexMedia-${version}-Linux-Installer.${ext}
